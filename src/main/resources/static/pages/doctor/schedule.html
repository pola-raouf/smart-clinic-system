<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My appointment calendar – Smart Clinic Doctor Portal.">
    <title>My Schedule – Smart Clinic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/schedule.css">

    <style>
    /* ── Calendar Override Styles ── */
    :root {
        --cal-confirmed : #16a34a;
        --cal-pending   : #d97706;
        --cal-completed : #7c3aed;
        --cal-booked    : #2563eb;
        --cal-cancelled : #dc2626;
    }

    .sched-page   { padding: 32px 0 56px; min-height: calc(100vh - 68px); background: var(--page-bg, #eef3fb); }
    .sched-wrap   { width: 92%; max-width: 1280px; margin: auto; }

    /* ── Page header ── */
    .sched-title-row {
        display: flex; align-items: flex-start; justify-content: space-between;
        gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .sched-title-row h1 { font-size: 26px; font-weight: 700; color: var(--slate-900); margin-bottom: 4px; }
    .sched-title-row p  { font-size: 14px; color: var(--slate-500); }

    /* ── Layout ── */
    .sched-body {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 24px;
        align-items: start;
    }

    /* ── Calendar Card ── */
    .cal-card {
        background: #fff;
        border: 1px solid var(--slate-200);
        border-radius: 14px;
        box-shadow: 0 2px 12px rgba(30,58,138,.07);
        overflow: hidden;
    }
    .cal-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 22px 14px;
        border-bottom: 1px solid var(--slate-100);
    }
    .cal-header h2 { font-size: 16px; font-weight: 700; color: var(--slate-900); }
    .cal-nav { display: flex; gap: 6px; }
    .cal-nav-btn {
        width: 32px; height: 32px; border: 1px solid var(--slate-200);
        background: #fff; border-radius: 8px; cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        color: var(--slate-600); font-size: 13px;
        transition: background .15s, border-color .15s;
    }
    .cal-nav-btn:hover { background: var(--slate-50); border-color: var(--slate-300); }

    .cal-month-label {
        font-size: 18px; font-weight: 700; color: var(--slate-900);
    }

    /* ── Weekday labels ── */
    .cal-weekdays {
        display: grid; grid-template-columns: repeat(7, 1fr);
        padding: 10px 16px 4px;
        text-align: center;
    }
    .cal-weekdays span {
        font-size: 11px; font-weight: 600; color: var(--slate-400);
        text-transform: uppercase; letter-spacing: .05em;
    }

    /* ── Days grid ── */
    .cal-days {
        display: grid; grid-template-columns: repeat(7, 1fr);
        gap: 2px; padding: 4px 16px 16px;
    }
    .cal-day {
        position: relative; min-height: 72px;
        padding: 6px 5px 5px;
        border-radius: 8px; cursor: pointer;
        transition: background .15s;
    }
    .cal-day:hover   { background: var(--slate-50); }
    .cal-day.today   { background: #eff6ff; }
    .cal-day.today .cal-day-num { color: var(--blue-600); font-weight: 700; }
    .cal-day.selected { background: var(--blue-600); }
    .cal-day.selected .cal-day-num { color: #fff; }
    .cal-day.other-month .cal-day-num { color: var(--slate-300); }
    .cal-day-num {
        font-size: 13px; font-weight: 500; color: var(--slate-700);
        display: block; margin-bottom: 4px;
    }
    .cal-dots { display: flex; flex-wrap: wrap; gap: 3px; }
    .cal-dot  {
        width: 7px; height: 7px; border-radius: 50%;
        flex-shrink: 0;
    }
    .cal-dot.confirmed  { background: var(--cal-confirmed); }
    .cal-dot.pending    { background: var(--cal-pending); }
    .cal-dot.completed  { background: var(--cal-completed); }
    .cal-dot.booked     { background: var(--cal-booked); }
    .cal-dot.cancelled  { background: var(--cal-cancelled); }

    /* ── Legend ── */
    .cal-legend {
        display: flex; flex-wrap: wrap; gap: 14px;
        padding: 10px 22px 16px;
        border-top: 1px solid var(--slate-100);
    }
    .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--slate-600); font-weight: 500; }
    .leg-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── Right Panel ── */
    .sched-panel { display: flex; flex-direction: column; gap: 16px; }
    .panel-card {
        background: #fff; border: 1px solid var(--slate-200);
        border-radius: 14px; box-shadow: 0 2px 12px rgba(30,58,138,.07);
        overflow: hidden;
    }
    .panel-card-header {
        display: flex; align-items: center; gap: 8px;
        padding: 14px 18px; border-bottom: 1px solid var(--slate-100);
        font-size: 14px; font-weight: 700; color: var(--slate-900);
    }
    .panel-card-header i { color: var(--blue-500); font-size: 16px; }
    .panel-card-body { padding: 14px 18px; }

    .panel-day-label {
        font-size: 13px; font-weight: 600; color: var(--slate-500);
        padding: 12px 18px 0;
    }

    /* ── Day Appointment List ── */
    .day-appt-list { display: flex; flex-direction: column; gap: 8px; padding: 10px 18px 14px; }
    .day-appt-item {
        display: flex; align-items: flex-start; gap: 10px;
        padding: 10px 12px; border-radius: 8px;
        border-left: 3px solid transparent;
        background: var(--slate-50);
        font-size: 13px;
    }
    .day-appt-item.confirmed  { border-color: var(--cal-confirmed);  background: #f0fdf4; }
    .day-appt-item.pending    { border-color: var(--cal-pending);    background: #fffbeb; }
    .day-appt-item.completed  { border-color: var(--cal-completed);  background: #faf5ff; }
    .day-appt-item.booked     { border-color: var(--cal-booked);     background: #eff6ff; }
    .day-appt-item.cancelled  { border-color: var(--cal-cancelled);  background: #fff5f5; opacity: .7; }
    .da-time  { font-weight: 700; color: var(--slate-900); white-space: nowrap; font-size: 12px; }
    .da-name  { font-weight: 600; color: var(--slate-800); }
    .da-reason{ font-size: 11.5px; color: var(--slate-500); margin-top: 1px; }
    .da-badge {
        margin-left: auto; padding: 2px 8px; border-radius: 99px;
        font-size: 10.5px; font-weight: 700; white-space: nowrap;
    }
    .da-badge.confirmed { background:#dcfce7; color:#15803d; }
    .da-badge.pending   { background:#fef3c7; color:#b45309; }
    .da-badge.completed { background:#ede9fe; color:#6d28d9; }
    .da-badge.booked    { background:#dbeafe; color:#1d4ed8; }
    .da-badge.cancelled { background:#fee2e2; color:#b91c1c; }

    .panel-empty {
        text-align: center; padding: 24px 16px;
        color: var(--slate-400); font-size: 13px;
    }
    .panel-empty i { font-size: 28px; display: block; margin-bottom: 6px; }

    /* ── Stats cards ── */
    .ps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .ps-item { display: flex; flex-direction: column; gap: 2px; }
    .ps-label { font-size: 11.5px; color: var(--slate-500); font-weight: 500; }
    .ps-val   { font-size: 20px; font-weight: 700; color: var(--slate-900); }

    @media (max-width: 900px) {
        .sched-body { grid-template-columns: 1fr; }
        .sched-panel { flex-direction: row; flex-wrap: wrap; }
        .panel-card  { flex: 1 1 260px; }
    }
    </style>
</head>
<body>

<!-- ── Navbar ── -->
<div id="navbar-container"></div>

<main class="sched-page">
  <div class="sched-wrap">

    <!-- Header -->
    <div class="sched-title-row">
      <div>
        <h1><i class="ph-bold ph-calendar-blank"></i> My Schedule</h1>
        <p>All your appointments — booked, confirmed, and completed</p>
      </div>
    </div>

    <div class="sched-body">

      <!-- ── Calendar ── -->
      <div class="cal-card">
        <div class="cal-header">
          <span class="cal-month-label" id="cal-month-label">Loading…</span>
          <div class="cal-nav">
            <button class="cal-nav-btn" id="cal-prev" title="Previous month">
              <i class="ph-bold ph-caret-left"></i>
            </button>
            <button class="cal-nav-btn" id="cal-today" title="Today">Today</button>
            <button class="cal-nav-btn" id="cal-next" title="Next month">
              <i class="ph-bold ph-caret-right"></i>
            </button>
          </div>
        </div>

        <div class="cal-weekdays">
          <span>Sun</span><span>Mon</span><span>Tue</span>
          <span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>

        <div class="cal-days" id="cal-days">
          <!-- Populated by JS -->
        </div>

        <div class="cal-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--cal-booked)"></div>Booked</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--cal-confirmed)"></div>Confirmed</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--cal-pending)"></div>Pending</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--cal-completed)"></div>Completed</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--cal-cancelled)"></div>Cancelled</div>
        </div>
      </div>

      <!-- ── Right Panel ── -->
      <div class="sched-panel">

        <!-- Month stats -->
        <div class="panel-card">
          <div class="panel-card-header">
            <i class="ph-bold ph-chart-bar"></i> This Month
          </div>
          <div class="panel-card-body">
            <div class="ps-grid">
              <div class="ps-item"><span class="ps-label">Total</span><span class="ps-val" id="stat-total">—</span></div>
              <div class="ps-item"><span class="ps-label">Confirmed</span><span class="ps-val" style="color:var(--cal-confirmed)" id="stat-confirmed">—</span></div>
              <div class="ps-item"><span class="ps-label">Pending</span><span class="ps-val" style="color:var(--cal-pending)" id="stat-pending">—</span></div>
              <div class="ps-item"><span class="ps-label">Completed</span><span class="ps-val" style="color:var(--cal-completed)" id="stat-completed">—</span></div>
            </div>
          </div>
        </div>

        <!-- Day appointments -->
        <div class="panel-card">
          <div class="panel-card-header">
            <i class="ph-bold ph-calendar-check"></i>
            <span id="panel-day-title">Select a day</span>
          </div>
          <div id="day-appt-container">
            <div class="panel-empty">
              <i class="ph-bold ph-calendar-blank"></i>
              Click a day on the calendar to see appointments
            </div>
          </div>
        </div>

      </div><!-- /panel -->

    </div><!-- /sched-body -->
  </div>
</main>

<script src="../../js/components/nav-menu.js"></script>
<script src="../../js/components/navbar.js"></script>
<script src="../../js/components/components.js"></script>
<script src="../../js/appointmentService.js"></script>
<script src="../../js/pages/doctor/schedule.js"></script>
</body>
</html>
