<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile – Smart Clinic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/profile.css">
</head>
<body data-role="doctor">

<nav class="navbar" id="main-navbar">
  <div class="nav-container">
    <a href="dashboard.html" class="logo">
      <div class="logo-icon"><i class="ph-bold ph-plus"></i></div>
      <span>Smart Clinic</span>
    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="appointments.html">Appointments</a></li>
      <li><a href="profile.html" class="active">My Profile</a></li>
    </ul>
    <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu" aria-expanded="false">
      <i class="ph-bold ph-list"></i>
    </button>
    <div class="nav-user-badge">
      <div class="nav-av" style="background:linear-gradient(135deg,#16a34a,#15803d)"><i class="ph-fill ph-user"></i></div>
      <span>Dr. Ahmed Ali</span>
    </div>
  </div>
</nav>

<main class="profile-page">
  <div class="profile-wrap">
    <div class="profile-topbar">
      <h1>My Profile</h1>
      <button class="btn-edit-profile" id="btn-edit">
        <i class="ph-bold ph-pencil"></i> Edit Profile
      </button>
    </div>
    <div class="profile-grid">

      <!-- LEFT -->
      <aside>
        <div class="profile-card">
          <div class="profile-av-wrap">
            <div class="profile-av" style="background:linear-gradient(135deg,#16a34a,#15803d)"><i class="ph-fill ph-user-circle"></i></div>
            <button class="profile-av-change" title="Change photo"><i class="ph-bold ph-camera"></i></button>
          </div>
          <h2>Dr. Ahmed Ali</h2>
          <span class="role-badge doctor">Doctor</span>
          <p class="pid">ID: D0001 · Cardiologist</p>
          <div class="profile-divider"></div>
          <ul class="profile-meta-list">
            <li><i class="ph-bold ph-calendar-blank"></i> <div><small style="font-size:10.5px;color:var(--slate-400);display:block">Joined</small> <strong>March 2023</strong></div></li>
            <li><i class="ph-bold ph-hospital"></i> <div>Cardiology Dept, Floor 3</div></li>
            <li><i class="ph-bold ph-star"></i> <div>4.9 rating · 120 reviews</div></li>
          </ul>
        </div>
      </aside>

      <!-- RIGHT -->
      <div class="profile-sections">

        <div class="profile-section">
          <div class="section-header">
            <i class="ph-bold ph-user-circle"></i><h3>Personal Information</h3>
          </div>
          <div class="section-body">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="f-name" value="Dr. Ahmed Ali" readonly>
              </div>
              <div class="form-group">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-input" id="f-dob" value="1985-03-20" readonly>
              </div>
              <div class="form-group">
                <label class="form-label">Gender</label>
                <select class="form-input form-select" id="f-gender" disabled>
                  <option value="male" selected>Male</option>
                  <option value="female">Female</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Specialty</label>
                <input type="text" class="form-input" value="Cardiologist" readonly>
              </div>
            </div>
          </div>
        </div>

        <div class="profile-section">
          <div class="section-header">
            <i class="ph-bold ph-address-book"></i><h3>Contact Information</h3>
          </div>
          <div class="section-body">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-input" id="f-phone" value="+20 100 999 0000" readonly>
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="f-email" value="dr.ahmed@smartclinic.com" readonly>
              </div>
              <div class="form-group" style="grid-column:1/-1">
                <label class="form-label">Address</label>
                <input type="text" class="form-input" id="f-address" value="Smart Clinic, 123 Medical Drive, Cairo, Egypt" readonly>
              </div>
            </div>
          </div>
        </div>

        <div class="profile-section">
          <div class="section-header">
            <i class="ph-bold ph-lock"></i><h3>Password</h3>
          </div>
          <div class="section-body">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" id="f-pwd-cur" value="••••••••" readonly>
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="f-pwd-new" placeholder="Enter new password" readonly>
              </div>
            </div>
            <div style="margin-top:10px">
              <button class="btn-change-pwd" id="btn-change-pwd"><i class="ph-bold ph-lock-key"></i> Change Password</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"><i class="ph-bold ph-check-circle"></i><span id="toast-msg"></span></div>
<script src="../../js/components/nav-menu.js"></script>
<script src="../../js/pages/profile.js"></script>
</body>
</html>
