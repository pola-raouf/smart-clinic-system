<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Patients – Smart Clinic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/doctor-pages.css">
</head>
<body>

<div id="navbar-container"></div>

<main class="doc-page">
  <div class="page-wrap">

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header-left">
        <h1>My Patients</h1>
        <p>View and access the patients who have visited you.</p>
      </div>
      <div class="page-header-illustration" aria-hidden="true">
        <i class="ph-bold ph-users-three"></i>
      </div>
    </div>

    <!-- Search & Filter Bar -->
    <div class="filter-bar">
      <div class="search-wrap">
        <i class="ph-bold ph-magnifying-glass"></i>
        <input type="text" id="pt-search" placeholder="Search by patient name or ID…">
      </div>
      <button class="btn-filter" id="btn-filter">
        <i class="ph-bold ph-funnel"></i> Filters
      </button>
    </div>

    <!-- Patients Table Card -->
    <div class="table-card">
      <div class="table-card-header">
        <h2>Patients (<span id="pt-count">0</span>)</h2>
      </div>

      <div class="table-wrap">
        <table class="data-table" id="patients-table">
          <thead>
            <tr>
              <th>Patient</th>
              <th>Patient ID</th>
              <th>Age / Gender</th>
              <th>Last Visit</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="patients-tbody">
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="table-footer">
        <span class="show-info" id="show-info">Showing 1 to 5 of 0 patients</span>
        <div class="pagination" id="pagination"></div>
      </div>

    </div><!-- /table-card -->

  </div>
</main>

<script src="../../js/components/nav-menu.js"></script>
<script src="../../js/components/navbar.js"></script>
<script src="../../js/components/components.js"></script>
<script src="../../js/appointmentService.js"></script>
<script src="../../js/pages/doctor/patients.js"></script>
</body>
</html>
