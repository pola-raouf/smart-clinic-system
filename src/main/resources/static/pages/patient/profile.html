<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile – Smart Clinic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"
      defer
    ></script>
    <link rel="stylesheet" href="../../css/layout.css" />
    <link rel="stylesheet" href="../../css/profile.css" />
  </head>
  <body data-role="patient">
    <div id="navbar-container"></div>

    <main class="profile-page">
      <div class="profile-wrap">
        <div class="profile-topbar">
          <h1>My Profile</h1>
          <button class="btn-edit-profile" id="btn-edit">
            <i class="ph-bold ph-pencil"></i> Edit Profile
          </button>
        </div>
        <div class="profile-grid">
          <!-- LEFT: Profile Card -->
          <aside>
            <div class="profile-card">
              <div class="profile-av-wrap">
                <img
                  id="profile-avatar-preview"
                  class="profile-av-img"
                  alt=""
                  width="90"
                  height="90"
                  hidden
                />
                <div
                  id="profile-avatar-fallback"
                  class="profile-av"
                  style="--av-hue: 215"
                >
                  <i class="ph-fill ph-user"></i>
                </div>
                <input
                  type="file"
                  id="profile-photo-input"
                  accept="image/jpeg,image/png,image/webp"
                  hidden
                />
                <button
                  type="button"
                  class="profile-av-change"
                  id="profile-photo-btn"
                  title="Change photo"
                >
                  <i class="ph-bold ph-camera"></i>
                </button>
                <button
                  type="button"
                  class="profile-av-delete"
                  id="profile-photo-del-btn"
                  title="Delete photo"
                >
                  <i class="ph-bold ph-trash"></i>
                </button>
              </div>
              <h2 id="card-name">Ahmed Hassan</h2>
              <span class="role-badge patient">Patient</span>
              <p class="pid" id="card-id">ID: P1001</p>
              <p class="profile-role-blurb" id="profile-role-blurb"></p>
              <div class="profile-divider"></div>
              <ul class="profile-meta-list">
                <li>
                  <i class="ph-bold ph-calendar-blank"></i>
                  <div>
                    <small
                      style="
                        font-size: 10.5px;
                        color: var(--slate-400);
                        display: block;
                      "
                      >Joined</small
                    >
                    <strong>January 2026</strong>
                  </div>
                </li>
                <li>
                  <i class="ph-bold ph-envelope"></i>
                  <div>ahmed@smartclinic.com</div>
                </li>
                <li>
                  <i class="ph-bold ph-map-pin"></i>
                  <div>Cairo, Egypt</div>
                </li>
              </ul>
            </div>
          </aside>

          <!-- RIGHT: Sections -->
          <div class="profile-sections">
            <!-- Personal Info -->
            <div class="profile-section">
              <div class="section-header">
                <i class="ph-bold ph-user-circle"></i>
                <h3>Personal Information</h3>
              </div>
              <div class="section-body">
                <div class="form-grid">
                  <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input
                      type="text"
                      class="form-input"
                      id="f-name"
                      value="Ahmed Hassan"
                      readonly
                    />
                  </div>
                  <div class="form-group">
                    <label class="form-label">Date of Birth</label>
                    <input
                      type="date"
                      class="form-input"
                      id="f-dob"
                      value="1990-06-15"
                      readonly
                    />
                  </div>
                  <div class="form-group">
                    <label class="form-label">Gender</label>
                    <select
                      class="form-input form-select"
                      id="f-gender"
                      disabled
                    >
                      <option value="male" selected>Male</option>
                      <option value="female">Female</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <!-- Contact Info -->
            <div class="profile-section">
              <div class="section-header">
                <i class="ph-bold ph-address-book"></i>
                <h3>Contact Information</h3>
              </div>
              <div class="section-body">
                <div class="form-grid">
                  <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input
                      type="tel"
                      class="form-input"
                      id="f-phone"
                      value="0100 111 1111"
                      readonly
                    />
                  </div>
                  <div class="form-group">
                    <label class="form-label">Email</label>
                    <input
                      type="email"
                      class="form-input"
                      id="f-email"
                      value="ahmed@smartclinic.com"
                      readonly
                    />
                  </div>
                  <div class="form-group" style="grid-column: 1/-1">
                    <label class="form-label">Address</label>
                    <input
                      type="text"
                      class="form-input"
                      id="f-address"
                      value="123 Medical Drive, Cairo, Egypt"
                      readonly
                    />
                  </div>
                </div>
              </div>
            </div>

            <!-- Password -->
            <div class="profile-section">
              <div class="section-header">
                <i class="ph-bold ph-lock"></i>
                <h3>Password</h3>
              </div>
              <div class="section-body">
                <div class="form-grid">
                  <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input
                      type="password"
                      class="form-input"
                      id="f-pwd-cur"
                      value="••••••••"
                      readonly
                    />
                  </div>
                  <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input
                      type="password"
                      class="form-input"
                      id="f-pwd-new"
                      placeholder="Enter new password"
                      readonly
                    />
                  </div>
                </div>
                <div style="margin-top: 10px">
                  <button class="btn-change-pwd" id="btn-change-pwd">
                    <i class="ph-bold ph-lock-key"></i> Change Password
                  </button>
                </div>
              </div>
            </div>
          </div>
          <!-- /sections -->
        </div>
        <!-- /grid -->
      </div>
    </main>

    <div class="toast" id="toast">
      <i class="ph-bold ph-check-circle"></i><span id="toast-msg"></span>
    </div>
    <script src="../../js/components/nav-menu.js"></script>
    <script src="../../js/components/navbar.js"></script>
    <script src="../../js/components/components.js"></script>
    <script src="../../js/appointmentService.js"></script>
    <script src="../../js/pages/patient/profile.js"></script>
  </body>
</html>
